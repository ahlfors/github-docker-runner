services:
  runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # --- GitHub 连接配置 ---
      # 方式一：组织级 Runner（推荐）
      RUNNER_SCOPE: org
      ORG_NAME: ${ORG_NAME}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      
      # 方式二：仓库级 Runner（二选一，注释上面三行，取消下面注释）
      # RUNNER_SCOPE: repo
      # REPO_URL: ${REPO_URL}
      # ACCESS_TOKEN: ${ACCESS_TOKEN}
      
      # --- Runner 配置 ---
      RUNNER_NAME_PREFIX: ${RUNNER_NAME_PREFIX:-runner}
      RANDOM_RUNNER_SUFFIX: "true"          # 自动生成唯一名称后缀
      RUNNER_WORKDIR: /tmp/runner/work      # 容器内工作目录（每个容器独立）
      LABELS: ${RUNNER_LABELS:-self-hosted,linux,x64,docker}
      RUNNER_GROUP: ${RUNNER_GROUP:-Default}
      
      # --- 可选配置 ---
      EPHEMERAL: "false"                    # true = 单次执行后销毁（适合自动伸缩）
      DISABLE_AUTO_UPDATE: "true"           # 禁用 Runner 自动更新（镜像控制版本）
      RUN_AS_ROOT: "true"                   # 是否以 root 运行

    volumes:
      # Docker-in-Docker 支持（如需在 workflow 中使用 docker 命令）
      - /var/run/docker.sock:/var/run/docker.sock
      # 持久化工作目录到宿主机（可选，方便调试）
      # - runner-work:/tmp/runner/work

    restart: unless-stopped

    # 资源限制（防止单个 Runner 占用过多资源）
    deploy:
      replicas: 4                           # ⬅️ 这里设置 Runner 数量
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 1G

    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'Runner.Listener' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    # 网络隔离（可选）
    networks:
      - runner-network

networks:
  runner-network:
    driver: bridge