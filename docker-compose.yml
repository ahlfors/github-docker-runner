x-runner-base: &runner-base
  build:
    context: .
    dockerfile: Dockerfile
  environment: &runner-env
    RUNNER_SCOPE: org
    ORG_NAME: ${ORG_NAME}
    RUNNER_TOKEN: ${RUNNER_TOKEN}
    LABELS: ${RUNNER_LABELS:-self-hosted,linux,x64,docker}
    RUNNER_GROUP: ${RUNNER_GROUP:-Default}
    DISABLE_AUTO_UPDATE: "true"
    RUN_AS_ROOT: "true"
    CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner-data
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pgrep -f 'Runner.Listener' || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: '2.0'
        memory: 4G

services:
  runner-1:
    <<: *runner-base
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME_PREFIX:-runner}-1
      RUNNER_WORKDIR: /tmp/runner/work-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data-1:/runner-data

  runner-2:
    <<: *runner-base
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME_PREFIX:-runner}-2
      RUNNER_WORKDIR: /tmp/runner/work-2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data-2:/runner-data

  runner-3:
    <<: *runner-base
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME_PREFIX:-runner}-3
      RUNNER_WORKDIR: /tmp/runner/work-3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data-3:/runner-data

  runner-4:
    <<: *runner-base
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME_PREFIX:-runner}-4
      RUNNER_WORKDIR: /tmp/runner/work-4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data-4:/runner-data

volumes:
  runner-data-1:
  runner-data-2:
  runner-data-3:
  runner-data-4: